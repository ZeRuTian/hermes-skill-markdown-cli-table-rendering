  <text x="350.0" y="72.0" text-anchor="end">38%</text>
  <text x="422.0" y="72.0" text-anchor="end">50%</text>
  <text x="442.0" y="72.0" text-anchor="start">↗︎ 上升</text>
  <text class="risk-mid" x="545.0" y="72.0" text-anchor="middle">中</text>
  <text x="586.0" y="72.0" text-anchor="start">仍低于计划，后续需要压缩评审、联调和业务确认周期。</text>
