  <text x="442.0" y="201.0" text-anchor="start">↘︎ 下降</text>
  <text class="risk-high" x="545.0" y="201.0" text-anchor="middle">高</text>
  <text x="586.0" y="192.0" text-anchor="start">对方接口文档仍不完整，建议每日同步字段口径并保留Mock兜底方</text>
  <text x="586.0" y="210.0" text-anchor="start">案。</text>
  <text x="56.0" y="250.0" text-anchor="end">5</text>
  <text x="76.0" y="250.0" text-anchor="start">培训</text>
  <text x="154.0" y="250.0" text-anchor="start">关键用户覆盖率</text>
  <text x="350.0" y="250.0" text-anchor="end">68%</text>
  <text x="422.0" y="250.0" text-anchor="end">95%</text>
