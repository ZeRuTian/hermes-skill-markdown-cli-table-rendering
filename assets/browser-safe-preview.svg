<svg xmlns="http://www.w3.org/2000/svg" width="790" height="142" viewBox="0 0 790 142" role="img" aria-label="Aligned CLI table preview">
  <rect width="100%" height="100%" fill="#0d1117"/>
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Noto Sans Mono CJK SC', 'Noto Sans CJK SC', monospace; font-size: 15px; fill: #e6edf3; dominant-baseline: middle; }
    .grid { stroke: #8b949e; stroke-width: 1.2; shape-rendering: crispEdges; fill: none; }
    .muted { fill: #c9d1d9; }
  </style>

  <!-- table geometry: x=12, y=12, widths = 88, 112, 72, 78, 416; row heights = 38, 38, 38 -->
  <g class="grid">
    <rect x="12" y="12" width="766" height="114"/>
    <line x1="100" y1="12" x2="100" y2="126"/>
    <line x1="212" y1="12" x2="212" y2="126"/>
    <line x1="284" y1="12" x2="284" y2="126"/>
    <line x1="362" y1="12" x2="362" y2="126"/>
    <line x1="12" y1="50" x2="778" y2="50"/>
    <line x1="12" y1="88" x2="778" y2="88"/>
  </g>

  <!-- header -->
  <text x="56" y="31" text-anchor="middle">指标类别</text>
  <text x="156" y="31" text-anchor="middle">指标名称</text>
  <text x="248" y="31" text-anchor="middle">当前值</text>
  <text x="323" y="31" text-anchor="middle">趋势</text>
  <text x="570" y="31" text-anchor="middle">说明</text>

  <!-- markdown-style separator row -->
  <text class="muted" x="56" y="69" text-anchor="middle">────────</text>
  <text class="muted" x="156" y="69" text-anchor="middle">──────────</text>
  <text class="muted" x="248" y="69" text-anchor="middle">──────</text>
  <text class="muted" x="323" y="69" text-anchor="middle">──────</text>
  <text class="muted" x="570" y="69" text-anchor="middle">────────────────────────────</text>

  <!-- data row -->
  <text x="24" y="107" text-anchor="start">进度</text>
  <text x="224" y="107" text-anchor="end">总体完成率</text>
  <text x="272" y="107" text-anchor="end">38%</text>
  <text x="296" y="107" text-anchor="start">↗︎ 上升</text>
  <text x="374" y="107" text-anchor="start">仍低于计划，后续需要压缩评审和联调周期。</text>
</svg>
