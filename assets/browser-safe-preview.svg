  <text class="header" x="324.0" y="32.0" text-anchor="middle">当前值</text>
  <text class="header" x="396.0" y="32.0" text-anchor="middle">目标值</text>
  <text class="header" x="473.0" y="32.0" text-anchor="middle">趋势</text>
